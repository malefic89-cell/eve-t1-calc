# /etc/nginx/sites-available/eve-t1-calc
# Замените server_name на ваш домен или IP сервера.
server {
    listen 80;
    server_name calc.example.com;

    # Приложение однопользовательское: настройки общие для всех посетителей,
    # поэтому доступ закрыт паролем (см. DEPLOY.md, шаг 6).
    auth_basic "EVE T1 Calc";
    auth_basic_user_file /etc/nginx/.htpasswd-eve;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # /api/refresh и первый прогрев могут отвечать долго
        proxy_read_timeout 300s;
    }
}

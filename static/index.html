<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EVE T1 Profit Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root {
  --bg: #0d1117; --panel: #161b22; --border: #30363d; --text: #c9d1d9;
  --dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --red: #f85149;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body { margin: 0; background: var(--bg); color: var(--text);
  font: 13px/1.4 "Segoe UI", system-ui, sans-serif;
  display: flex; flex-direction: column; }
header { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  background: var(--panel); border-bottom: 1px solid var(--border);
  flex-wrap: wrap; flex-shrink: 0; }
h1 { font-size: 16px; margin: 0 12px 0 0; }
button { background: #21262d; color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px; cursor: pointer; font: inherit; }
button:hover { border-color: var(--accent); }
button.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
input, select { background: #0d1117; color: var(--text); border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 8px; font: inherit; }
#status { color: var(--dim); font-size: 12px; }
#filters { display: flex; gap: 8px; padding: 8px 16px; flex-wrap: wrap; align-items: center;
  flex-shrink: 0; }
table { border-collapse: collapse; width: 100%; }
th, td { padding: 4px 7px; border-bottom: 1px solid var(--border);
  text-align: right; white-space: nowrap; }
td.name { max-width: 230px; overflow: hidden; text-overflow: ellipsis; }
td.grp { max-width: 130px; overflow: hidden; text-overflow: ellipsis; }
th:first-child, td:first-child, th.left, td.left { text-align: left; }
th { background: var(--panel); cursor: pointer; user-select: none;
  position: sticky; top: 0; z-index: 5; }
th.sorted::after { content: " ▾"; color: var(--accent); }
th.sorted.asc::after { content: " ▴"; }
tbody tr:hover { background: #161b22; cursor: pointer; }
.pos { color: var(--green); } .neg { color: var(--red); } .dim { color: var(--dim); }
.badge { display: inline-block; padding: 0 5px; border-radius: 4px; font-size: 10px;
  font-weight: 600; margin-left: 6px; vertical-align: middle;
  background: #21262d; border: 1px solid var(--border); color: var(--dim); }
.badge.warn { color: #d29922; border-color: #d29922; }
#tablewrap { flex: 1 1 auto; overflow: auto; }
#pager { display: none; gap: 10px; padding: 8px 16px; align-items: center;
  background: var(--panel); border-top: 1px solid var(--border); flex-shrink: 0; }
.help { display: inline-block; width: 14px; height: 14px; line-height: 14px;
  border-radius: 50%; background: #30363d; color: var(--dim); font-size: 10px;
  font-weight: normal; text-align: center; cursor: help; margin-left: 4px;
  vertical-align: middle; }
.help:hover { background: var(--accent); color: #fff; }
#tooltip { position: fixed; z-index: 1000; display: none; max-width: 300px;
  background: #1c2128; border: 1px solid var(--border); border-radius: 6px;
  padding: 8px 10px; font-size: 12px; line-height: 1.45; color: var(--text);
  box-shadow: 0 4px 16px rgba(0,0,0,.5); white-space: normal; text-align: left; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
  align-items: flex-start; justify-content: center; z-index: 100; overflow-y: auto; padding: 40px 16px; }
.modal-bg.open { display: flex; }
.modal { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
  padding: 20px; max-width: 860px; width: 100%; }
.modal h2 { margin-top: 0; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px 20px; margin: 10px 0; }
.grid label { display: block; color: var(--dim); font-size: 11px; margin-bottom: 2px; }
.grid input, .grid select { width: 100%; }
.close { float: right; }
#loading { padding: 60px; text-align: center; color: var(--dim); font-size: 15px; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>EVE T1 Profit Calculator</h1>
  <button class="primary" id="btnRefresh">⟳ Refresh prices</button>
  <button id="btnSettings">⚙ Settings</button>
  <span id="status"></span>
</header>

<div id="filters">
  <input id="fSearch" placeholder="Search name…" style="width:160px">
  <select id="fCategory" style="max-width:150px"><option value="">All categories</option></select>
  <select id="fGroup" style="max-width:150px"><option value="">All groups</option></select>
  <label class="dim">Margin ≥<span class="help" data-tip="Минимальная маржа, %: скрыть строки, у которых маржа выбранного сценария ниже указанной. Пусто — показывать все.">?</span></label>
  <input id="fMargin" type="number" value="" style="width:65px" placeholder="%">
  <label class="dim">Vol/day ≥<span class="help" data-tip="Минимальный дневной объём торгов: скрыть предметы, которых продаётся меньше указанного числа штук в день. Отсекает неликвид.">?</span></label>
  <input id="fVolume" type="number" value="" style="width:65px" placeholder="any">
  <label class="dim">Runs<span class="help" data-tip="Число прогонов одного job для всех чертежей без индивидуальной настройки. Влияет на округление материалов (экономия ME накапливается), глубину закупки/продажи в стакане, job cost и время.">?</span></label>
  <input id="fRuns" type="number" min="1" value="1" style="width:65px">
  <label class="dim">Scenario<span class="help" data-tip="Сценарий торговли для колонок Margin % и ISK/h. Inst — мгновенно по текущим ордерам, Order — своим ордером (дешевле купить / дороже продать, но дольше и с брокерской комиссией). Формат: покупка материалов → продажа продукта.">?</span></label>
  <select id="fScenario">
    <option value="buy_sell">Inst → Inst</option>
    <option value="buy_order" selected>Inst → Order</option>
    <option value="order_sell">Order → Inst</option>
    <option value="order_order">Order → Order</option>
  </select>
  <label class="dim"><input type="checkbox" id="fBpc" style="vertical-align:middle"> BPC/susp<span class="help" data-tip="Показать предметы, чертежи которых нельзя купить на рынке (BPC-only: ивентовые корабли SoCT/EDENCOM, бустеры, акселераторы) и строки с подозрительными данными SDE (пустой список материалов или себестоимость < 1% цены продажи). По умолчанию скрыты — их маржа обманчива, если чертёж не достался бесплатно.">?</span></label>
  <span class="dim" id="rowCount"></span>
</div>

<div id="loading"><span class="spinner"></span><span id="loadingText">Starting…</span></div>

<div id="tablewrap" style="display:none">
<table id="tbl">
  <thead><tr>
    <th class="left" data-k="name">Item<span class="help" data-tip="Производимый T1-предмет. Длинные названия обрезаются — полное видно при наведении. Клик по строке — детали: материалы, сценарии, настройки чертежа (ME/TE/Runs).">?</span></th>
    <th class="left" data-k="group">Group<span class="help" data-tip="Группа предмета (Frigate, Rig Armor, Hybrid Charge…). Категория видна при наведении на ячейку; фильтр по категориям — в панели сверху.">?</span></th>
    <th data-k="runs">Runs<span class="help" data-tip="Число прогонов, по которому посчитана строка: значение из панели фильтров или индивидуальное для чертежа (задаётся в деталях). Все денежные колонки — на весь job.">?</span></th>
    <th data-k="cost">Cost/job<span class="help" data-tip="Стоимость материалов на весь job при мгновенной покупке с sell-ордеров Jita 4-4. Цена взвешена по глубине стакана — для больших партий она выше лучшего ордера.">?</span></th>
    <th data-k="job_cost">Job cost<span class="help" data-tip="Стоимость установки работы: EIV × индекс системы × (1 − бонус структуры) + налог структуры + 4% сбор SCC. EIV — сумма базовых материалов по adjusted-ценам CCP.">?</span></th>
    <th data-k="sell_via_sell_order">Sell price<span class="help" data-tip="Цена за единицу при продаже своим sell-ордером (лучший текущий ask в Jita 4-4).">?</span></th>
    <th data-k="p_buy_sell">P: inst→inst<span class="help" data-tip="Прибыль за job: материалы куплены мгновенно с sell-ордеров, продукт продан мгновенно в buy-ордера. Самый быстрый, но наименее выгодный сценарий. Учтён налог с продаж.">?</span></th>
    <th data-k="p_buy_order">P: inst→order<span class="help" data-tip="Прибыль за job: материалы куплены мгновенно, продукт выставлен своим sell-ордером. Учтены налог с продаж и брокерская комиссия на продажу.">?</span></th>
    <th data-k="p_order_sell">P: ord→inst<span class="help" data-tip="Прибыль за job: материалы закуплены своими buy-ордерами (дешевле, но ждать), продукт продан мгновенно. Учтены брокерская комиссия на закупку и налог с продаж.">?</span></th>
    <th data-k="p_order_order">P: ord→ord<span class="help" data-tip="Прибыль за job: и закупка, и продажа своими ордерами. Максимальная маржа, но требует времени и присмотра за ордерами. Учтены обе брокерские комиссии и налог.">?</span></th>
    <th data-k="margin">Margin %<span class="help" data-tip="Маржа выбранного в фильтре сценария: прибыль ÷ полные затраты × 100%.">?</span></th>
    <th data-k="iph">ISK/h<span class="help" data-tip="Прибыль в час для выбранного сценария: прибыль за job ÷ время производства job (с учётом TE, навыков и бонуса структуры).">?</span></th>
    <th data-k="daily_volume">Daily vol<span class="help" data-tip="Средний дневной объём торгов в регионе The Forge за последние 7 дней. Показывает, сколько штук реально удастся продать.">?</span></th>
  </tr></thead>
  <tbody id="tbody"></tbody>
</table>
</div>

<div id="pager">
  <button id="pgPrev">← Prev</button>
  <span id="pgInfo" class="dim"></span>
  <button id="pgNext">Next →</button>
</div>

<!-- Settings modal -->
<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <button class="close" onclick="closeModal('settingsModal')">✕</button>
    <h2>Settings</h2>
    <h3>Skills</h3>
    <div class="grid">
      <div><label>Accounting (0-5)<span class="help" data-tip="Навык Accounting: снижает налог с продаж на 11% за уровень. База 7.5%, при V — 3.375%. Налог платится с каждой продажи.">?</span></label><input type="number" min="0" max="5" id="s_accounting"></div>
      <div><label>Broker Relations (0-5)<span class="help" data-tip="Навык Broker Relations: снижает брокерскую комиссию на 0.3% за уровень (база 3%). Комиссия платится только при выставлении своих ордеров.">?</span></label><input type="number" min="0" max="5" id="s_broker_relations"></div>
      <div><label>Industry (0-5)<span class="help" data-tip="Навык Industry: −4% ко времени производства за уровень.">?</span></label><input type="number" min="0" max="5" id="s_industry"></div>
      <div><label>Advanced Industry (0-5)<span class="help" data-tip="Навык Advanced Industry: −3% ко времени производства за уровень.">?</span></label><input type="number" min="0" max="5" id="s_advanced_industry"></div>
    </div>
    <h3>Standings (Jita 4-4 owner)</h3>
    <div class="grid">
      <div><label>Faction standing<span class="help" data-tip="Стендинг к фракции Caldari State (владелец Jita 4-4): −0.03% к брокерской комиссии за каждый пункт. Минимум комиссии на NPC-станции — 1%.">?</span></label><input type="number" step="0.01" id="s_faction_standing"></div>
      <div><label>Corp standing<span class="help" data-tip="Стендинг к корпорации Caldari Navy: −0.02% к брокерской комиссии за каждый пункт.">?</span></label><input type="number" step="0.01" id="s_corp_standing"></div>
    </div>
    <h3>Blueprint</h3>
    <div class="grid">
      <div><label>ME (0-10)<span class="help" data-tip="Material Efficiency чертежа по умолчанию: −1% материалов за уровень. Для отдельного чертежа можно задать своё значение в деталях предмета.">?</span></label><input type="number" min="0" max="10" id="s_blueprint_me"></div>
      <div><label>TE (0-20)<span class="help" data-tip="Time Efficiency чертежа по умолчанию: −1% времени производства за уровень (0–20). Переопределяется в деталях предмета.">?</span></label><input type="number" min="0" max="20" id="s_blueprint_te"></div>
    </div>
    <h3>Structure</h3>
    <div class="grid">
      <div><label>Material bonus %<span class="help" data-tip="Бонус структуры к расходу материалов: у Raitaru/Azbel/Sotiyo это 1%. Для NPC-станции — 0.">?</span></label><input type="number" step="0.1" id="s_structure_material_bonus"></div>
      <div><label>Rig material bonus %<span class="help" data-tip="Бонус ME-рига структуры с учётом множителя региона: T1-риг 2% (×1 в hisec = 2%, ×1.9 в lowsec = 3.8%, ×2.1 в null = 4.2%). Если риг не подходит к предмету — ставь 0.">?</span></label><input type="number" step="0.1" id="s_structure_rig_material_bonus"></div>
      <div><label>Time bonus %<span class="help" data-tip="Бонус структуры ко времени производства: Raitaru 15%, Azbel 20%, Sotiyo 30%. Плюс TE-риги, если есть.">?</span></label><input type="number" step="0.1" id="s_structure_time_bonus"></div>
      <div><label>Structure tax %<span class="help" data-tip="Налог, выставленный владельцем структуры (виден в окне установки работы). Берётся от полного EIV. На NPC-станциях — 0.25%.">?</span></label><input type="number" step="0.1" id="s_structure_tax"></div>
      <div><label>Job cost bonus % (Raitaru 3, Azbel 4, Sotiyo 5)<span class="help" data-tip="Бонус профиля инженерного комплекса к стоимости работы: уменьшает часть EIV × индекс системы. Raitaru 3%, Azbel 4%, Sotiyo 5%; NPC-станция — 0.">?</span></label>
        <input type="number" step="0.1" id="s_structure_cost_bonus"></div>
    </div>
    <h3>Manufacturing system</h3>
    <div class="grid">
      <div style="grid-column: span 2">
        <label>System (type to search)<span class="help" data-tip="Система, где стоит производство: определяет индекс стоимости работ (доля производства системы во всём кластере за 28 дней). Чем популярнее система, тем дороже установка работы. Индекс показывается в подсказках списка.">?</span></label>
        <input id="s_system_search" list="systemList" placeholder="e.g. Sobaseki">
        <datalist id="systemList"></datalist>
        <div class="dim" id="s_system_current"></div>
      </div>
    </div>
    <p><button class="primary" id="btnSaveSettings">Save</button></p>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-bg" id="detailModal">
  <div class="modal" id="detailBody"></div>
</div>

<script>
let ROWS = [], sortKey = "p_buy_order", sortAsc = false, SETTINGS = {}, selectedSystem = null;
let page = 0;
const PAGE_SIZE = 100;

const fmt = (v, d=0) => v == null ? "—" :
  v.toLocaleString("en-US", {maximumFractionDigits: d, minimumFractionDigits: 0});
const fmtIsk = v => v == null ? "—" : fmt(v, v < 100 ? 2 : 0);
// compact money for table cells: 12.3k / 4.56M / 1.23B (exact value in title)
const fmtC = v => {
  if (v == null) return "—";
  const a = Math.abs(v);
  if (a >= 1e9) return (v / 1e9).toFixed(2) + "B";
  if (a >= 1e6) return (v / 1e6).toFixed(2) + "M";
  if (a >= 1e4) return (v / 1e3).toFixed(1) + "k";
  return fmt(v, a < 100 ? 2 : 0);
};
const cls = v => v == null ? "dim" : v >= 0 ? "pos" : "neg";

function metric(r, key) {
  const sc = r.scenarios;
  switch (key) {
    case "cost": return r.material_cost_instant;
    case "p_buy_sell": return sc.buy_sell.profit;
    case "p_buy_order": return sc.buy_order.profit;
    case "p_order_sell": return sc.order_sell.profit;
    case "p_order_order": return sc.order_order.profit;
    case "margin": return sc[curScenario()].margin;
    case "iph": return sc[curScenario()].iph;
    default: return r[key];
  }
}
const curScenario = () => document.getElementById("fScenario").value;
const badges = r =>
  (r.bpc_only ? `<span class="badge" title="Чертёж не продаётся на рынке (BPC-only, ивентовый дроп)">BPC</span>` : "") +
  (r.suspicious ? `<span class="badge warn" title="Подозрительные данные SDE: пустой рецепт или себестоимость < 1% цены продажи">⚠ data</span>` : "");

function render() {
  const q = document.getElementById("fSearch").value.toLowerCase();
  const cat = document.getElementById("fCategory").value;
  const minM = parseFloat(document.getElementById("fMargin").value);
  const minV = parseFloat(document.getElementById("fVolume").value);
  const scen = curScenario();

  const grp = document.getElementById("fGroup").value;
  const showBpc = document.getElementById("fBpc").checked;
  let rows = ROWS.filter(r => {
    if (!showBpc && (r.bpc_only || r.suspicious)) return false;
    if (q && !r.name.toLowerCase().includes(q)) return false;
    if (cat && r.category !== cat) return false;
    if (grp && r.group !== grp) return false;
    const m = r.scenarios[scen].margin;
    if (!isNaN(minM) && (m == null || m < minM)) return false;
    if (!isNaN(minV) && (r.daily_volume == null || r.daily_volume < minV)) return false;
    return true;
  });

  rows.sort((a, b) => {
    let x = metric(a, sortKey), y = metric(b, sortKey);
    if (typeof x === "string") return sortAsc ? x.localeCompare(y) : y.localeCompare(x);
    x = x == null ? -Infinity : x; y = y == null ? -Infinity : y;
    return sortAsc ? x - y : y - x;
  });

  document.getElementById("rowCount").textContent = `${rows.length} items`;

  const pages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
  page = Math.min(page, pages - 1);
  document.getElementById("pager").style.display = rows.length > PAGE_SIZE ? "flex" : "none";
  document.getElementById("pgInfo").textContent =
    `Page ${page + 1} / ${pages} · items ${rows.length ? page * PAGE_SIZE + 1 : 0}–${Math.min(rows.length, (page + 1) * PAGE_SIZE)} of ${rows.length}`;
  document.getElementById("pgPrev").disabled = page === 0;
  document.getElementById("pgNext").disabled = page >= pages - 1;

  const scKeys = ["buy_sell","buy_order","order_sell","order_order"];
  document.getElementById("tbody").innerHTML = rows.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE).map(r => {
    const s = r.scenarios[scen];
    return `<tr onclick="openDetail(${r.type_id})">
      <td class="left name" title="${r.name}">${r.name}${badges(r)}</td>
      <td class="left dim grp" title="${r.category} / ${r.group}">${r.group}</td>
      <td>${fmt(r.runs)}</td>
      <td title="${fmtIsk(r.material_cost_instant)}">${fmtC(r.material_cost_instant)}</td>
      <td title="${fmtIsk(r.job_cost)}">${fmtC(r.job_cost)}</td>
      <td title="${fmtIsk(r.sell_via_sell_order)}">${fmtC(r.sell_via_sell_order)}</td>
      ${scKeys.map(k => { const p = r.scenarios[k].profit;
        return `<td class="${cls(p)}" title="${fmtIsk(p)}">${fmtC(p)}</td>`; }).join("")}
      <td class="${cls(s.margin)}">${s.margin == null ? "—" : s.margin.toFixed(1)}</td>
      <td class="${cls(s.iph)}" title="${fmtIsk(s.iph)}">${fmtC(s.iph)}</td>
      <td title="${fmt(r.daily_volume)}">${r.daily_volume == null ? "—" : fmtC(Math.round(r.daily_volume))}</td>
    </tr>`;
  }).join("");

  document.querySelectorAll("th").forEach(th => {
    th.classList.toggle("sorted", th.dataset.k === sortKey);
    th.classList.toggle("asc", th.dataset.k === sortKey && sortAsc);
  });
}

document.querySelectorAll("th").forEach(th => th.onclick = () => {
  if (sortKey === th.dataset.k) sortAsc = !sortAsc;
  else { sortKey = th.dataset.k; sortAsc = false; }
  page = 0;
  render();
});
["fSearch","fCategory","fGroup","fMargin","fVolume","fScenario","fBpc"].forEach(id =>
  document.getElementById(id).addEventListener("input", () => { page = 0; render(); }));

document.getElementById("pgPrev").onclick = () => {
  if (page > 0) { page--; render(); document.getElementById("tablewrap").scrollTop = 0; }
};
document.getElementById("pgNext").onclick = () => {
  page++; render(); document.getElementById("tablewrap").scrollTop = 0;
};
document.getElementById("fCategory").addEventListener("input", updateGroups);
// truncated select values (max-width) show in full on hover
["fCategory","fGroup"].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener("input", () => el.title = el.value || "");
});

function updateGroups() {
  const cat = document.getElementById("fCategory").value;
  const sel = document.getElementById("fGroup");
  const prev = sel.value;
  const groups = [...new Set(ROWS.filter(r => !cat || r.category === cat)
    .map(r => r.group))].sort();
  sel.innerHTML = `<option value="">All groups</option>` +
    groups.map(g => `<option${g === prev ? " selected" : ""}>${g}</option>`).join("");
  if (sel.value !== prev) render();
}

async function loadItems() {
  const r = await fetch("/api/items");
  if (!r.ok) return;
  ROWS = (await r.json()).rows;
  document.getElementById("loading").style.display = "none";
  document.getElementById("tablewrap").style.display = "";
  updateGroups();
  render();
}

async function initRuns() {
  try {
    const s = await (await fetch("/api/settings")).json();
    document.getElementById("fRuns").value = s.runs || 1;
  } catch (e) { /* server starting */ }
}
initRuns();

async function loadCategories() {
  const r = await fetch("/api/categories");
  if (!r.ok) return;
  const sel = document.getElementById("fCategory");
  (await r.json()).forEach(c => {
    const o = document.createElement("option"); o.value = o.textContent = c; sel.appendChild(o);
  });
}

// ---------- status polling ----------
let wasReady = false, historyWasRunning = false;
async function poll() {
  try {
    const s = await (await fetch("/api/status")).json();
    let txt = "";
    if (s.status === "ready") {
      const age = s.orders_age_s == null ? "?" : Math.round(s.orders_age_s / 60);
      txt = `${s.rows} items · orders ${age} min old`;
      if (s.history_running) txt += ` · volumes ${s.history_done}/${s.history_total}`;
      // reload once more after the volume fetch finishes: the final recompute
      // (with all volumes) happens after history_running flips back to false
      if (!wasReady || s.history_running || historyWasRunning) {
        loadItems();
        if (!wasReady) loadCategories();
      }
      historyWasRunning = s.history_running;
      wasReady = true;
    } else if (s.status === "error") {
      txt = "ERROR: " + s.error;
      document.getElementById("loadingText").textContent = txt;
    } else {
      wasReady = false;
      txt = s.progress || s.status;
      document.getElementById("loading").style.display = "";
      document.getElementById("tablewrap").style.display = "none";
      document.getElementById("loadingText").textContent = txt;
    }
    document.getElementById("status").textContent = txt;
  } catch (e) { /* server restarting */ }
  setTimeout(poll, wasReady ? 5000 : 1500);
}

// ---------- actions ----------
document.getElementById("btnRefresh").onclick = async () => {
  await fetch("/api/refresh", {method: "POST"}); wasReady = false;
};
let runsTimer = null;
document.getElementById("fRuns").addEventListener("input", () => {
  clearTimeout(runsTimer);
  runsTimer = setTimeout(async () => {
    const runs = parseInt(document.getElementById("fRuns").value);
    if (!runs || runs < 1) return;
    const cur = await (await fetch("/api/settings")).json();
    await fetch("/api/settings", {method: "PUT",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({...cur, runs})});
    loadItems();
  }, 400);
});

// ---------- settings ----------
const S_FIELDS = ["accounting","broker_relations","industry","advanced_industry",
  "faction_standing","corp_standing","blueprint_me","blueprint_te",
  "structure_material_bonus","structure_rig_material_bonus","structure_time_bonus",
  "structure_tax","structure_cost_bonus"];

document.getElementById("btnSettings").onclick = async () => {
  SETTINGS = await (await fetch("/api/settings")).json();
  S_FIELDS.forEach(f => document.getElementById("s_" + f).value = SETTINGS[f]);
  selectedSystem = null;
  const curIdx = SETTINGS.current_manufacturing_index;
  document.getElementById("s_system_current").textContent =
    `Current: ${SETTINGS.system_name} (${SETTINGS.system_id})` +
    (curIdx == null ? "" : ` · manufacturing index ${(curIdx * 100).toFixed(2)}%`);
  document.getElementById("settingsModal").classList.add("open");
};

document.getElementById("s_system_search").addEventListener("input", async e => {
  const q = e.target.value;
  if (q.length < 2) return;
  const list = await (await fetch("/api/systems?q=" + encodeURIComponent(q))).json();
  const dl = document.getElementById("systemList");
  dl.innerHTML = list.map(s => {
    const idx = s.manufacturing_index == null ? "" :
      ` — index ${(s.manufacturing_index * 100).toFixed(2)}%`;
    return `<option value="${s.name}" label="${s.name}${idx}" data-id="${s.system_id}">`;
  }).join("");
  const exact = list.find(s => s.name.toLowerCase() === q.toLowerCase());
  if (exact) {
    selectedSystem = exact;
    const idx = exact.manufacturing_index;
    document.getElementById("s_system_current").textContent =
      `Selected: ${exact.name} (${exact.system_id})` +
      (idx == null ? "" : ` · manufacturing index ${(idx * 100).toFixed(2)}%`);
  }
});

document.getElementById("btnSaveSettings").onclick = async () => {
  const payload = {...SETTINGS};
  S_FIELDS.forEach(f => payload[f] = parseFloat(document.getElementById("s_" + f).value));
  if (selectedSystem) { payload.system_id = selectedSystem.system_id; payload.system_name = selectedSystem.name; }
  const r = await fetch("/api/settings", {method: "PUT",
    headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload)});
  if (!r.ok) { alert("Save failed: " + (await r.json()).detail); return; }
  closeModal("settingsModal");
  loadItems();
};

// ---------- detail ----------
async function openDetail(typeId) {
  const d = await (await fetch("/api/item/" + typeId)).json();
  const r = d.row, sc = r.scenarios;
  const scenNames = {buy_sell: "Buy instant → Sell instant", buy_order: "Buy instant → Sell order",
    order_sell: "Buy orders → Sell instant", order_order: "Buy orders → Sell order"};
  document.getElementById("detailBody").innerHTML = `
    <button class="close" onclick="closeModal('detailModal')">✕</button>
    <h2>${r.name}${badges(r)}</h2>
    <p class="dim">${r.category} / ${r.group} · ${r.qty_per_run} per run ·
      ${(r.time_per_run_s/60).toFixed(1)} min/run · job: ${r.runs} run${r.runs > 1 ? "s" : ""} ·
      job cost ${fmtIsk(r.job_cost)} ISK</p>
    <p>
      <b>Blueprint:</b>
      ME <input type="number" min="0" max="10" id="bp_me" value="${r.me}" style="width:60px">
      TE <input type="number" min="0" max="20" id="bp_te" value="${r.te}" style="width:60px">
      Runs <input type="number" min="1" id="bp_runs" value="${r.runs}" style="width:70px">
      <button class="primary" onclick="saveBp(${d.blueprint_type_id}, ${r.type_id})">Save</button>
      ${r.has_override
        ? `<button onclick="resetBp(${d.blueprint_type_id}, ${r.type_id})">Use default</button>
           <span class="dim">custom for this blueprint</span>`
        : `<span class="dim">global default</span>`}
    </p>
    <h3>Materials (per job, ME applied)</h3>
    <table><thead><tr><th class="left">Material</th><th>Base</th><th>With ME</th>
      <th>Sell price (VW)</th><th>Best buy</th><th>Cost (instant)</th></tr></thead><tbody>
      ${d.materials.map(m => `<tr>
        <td class="left">${m.name}</td><td>${fmt(m.base_qty)}</td><td>${fmt(m.qty_with_me)}</td>
        <td>${fmtIsk(m.vw_sell_price)}</td><td>${fmtIsk(m.best_buy_price)}</td>
        <td>${m.vw_sell_price == null ? "—" : fmtIsk(m.vw_sell_price * m.qty_with_me)}</td>
      </tr>`).join("")}
      <tr><td class="left"><b>Total (instant / via orders)</b></td><td></td><td></td><td></td><td></td>
        <td><b>${fmtIsk(r.material_cost_instant)} / ${fmtIsk(r.material_cost_orders)}</b></td></tr>
    </tbody></table>
    <h3>Scenarios (per job)</h3>
    <table><thead><tr><th class="left">Scenario</th><th>Profit</th><th>Margin %</th><th>ISK/h</th></tr></thead>
    <tbody>${Object.entries(scenNames).map(([k, n]) => `<tr>
      <td class="left">${n}</td>
      <td class="${cls(sc[k].profit)}">${fmtIsk(sc[k].profit)}</td>
      <td class="${cls(sc[k].margin)}">${sc[k].margin == null ? "—" : sc[k].margin.toFixed(1)}</td>
      <td class="${cls(sc[k].iph)}">${fmtIsk(sc[k].iph)}</td>
    </tr>`).join("")}</tbody></table>`;
  document.getElementById("detailModal").classList.add("open");
}

async function saveBp(bpId, typeId) {
  const me = parseInt(document.getElementById("bp_me").value);
  const te = parseInt(document.getElementById("bp_te").value);
  const runs = parseInt(document.getElementById("bp_runs").value);
  const r = await fetch("/api/blueprint/" + bpId, {method: "PUT",
    headers: {"Content-Type": "application/json"}, body: JSON.stringify({me, te, runs})});
  if (!r.ok) { alert("Save failed: " + (await r.json()).detail); return; }
  openDetail(typeId);
  loadItems();
}

async function resetBp(bpId, typeId) {
  await fetch("/api/blueprint/" + bpId, {method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({me: null, te: null, runs: null})});
  openDetail(typeId);
  loadItems();
}

// ---------- help tooltips ----------
const tipEl = document.createElement("div");
tipEl.id = "tooltip";
document.body.appendChild(tipEl);

function showTip(help) {
  tipEl.textContent = help.dataset.tip;
  tipEl.style.display = "block";
  const r = help.getBoundingClientRect(), tw = tipEl.offsetWidth, th = tipEl.offsetHeight;
  let x = r.left + r.width / 2 - tw / 2;
  x = Math.max(8, Math.min(x, window.innerWidth - tw - 8));
  let y = r.bottom + 6;
  if (y + th > window.innerHeight - 8) y = r.top - th - 6;
  tipEl.style.left = x + "px";
  tipEl.style.top = y + "px";
}
function hideTip() { tipEl.style.display = "none"; }

document.addEventListener("mouseover", e => {
  const h = e.target.closest(".help");
  if (h) showTip(h);
});
document.addEventListener("mouseout", e => {
  if (e.target.closest(".help")) hideTip();
});
// tap/click support (mobile); also keep a header "?" click from sorting
document.addEventListener("click", e => {
  const h = e.target.closest(".help");
  if (h) {
    e.stopPropagation();
    tipEl.style.display === "block" ? hideTip() : showTip(h);
  } else hideTip();
}, true);
window.addEventListener("scroll", hideTip, true);

function closeModal(id) { document.getElementById(id).classList.remove("open"); }
document.querySelectorAll(".modal-bg").forEach(m =>
  m.addEventListener("click", e => { if (e.target === m) m.classList.remove("open"); }));

poll();
</script>
</body>
